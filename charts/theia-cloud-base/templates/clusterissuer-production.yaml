{{- if .Values.issuerprod.enable }}
{{- $dns01 := default (dict) .Values.issuerprod.dns01 }}
{{- if not (kindIs "map" $dns01) }}
{{- fail "issuerprod.dns01 must be a map containing one provider: route53, cloudflare, azureDNS, or webhook" }}
{{- end }}
{{- $hasProvider := or (hasKey $dns01 "route53") (hasKey $dns01 "cloudflare") (hasKey $dns01 "azureDNS") (hasKey $dns01 "webhook") }}
{{- if not $hasProvider }}
{{- fail "issuerprod.dns01 must configure one provider: route53, cloudflare, azureDNS, or webhook" }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuerprod.name }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ tpl (.Values.issuer.email | toString) . }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        {{- toYaml $dns01 | nindent 8 }}
{{- end }}
            
