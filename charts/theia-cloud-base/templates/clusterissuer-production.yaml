{{- if .Values.issuerprod.enable }}
{{- $solvers := default (list) .Values.issuerprod.solvers }}
{{- if not (kindIs "slice" $solvers) }}
{{- fail "issuerprod.solvers must be a list of ACME solver entries" }}
{{- end }}
{{- if eq (len $solvers) 0 }}
{{- fail "issuerprod.solvers must define at least one ACME solver when issuerprod.enable=true" }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuerprod.name }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ tpl (.Values.issuer.email | toString) . }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
{{ toYaml $solvers | nindent 4 }}
{{- end }}
            
