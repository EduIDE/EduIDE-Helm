{{- if and .Values.gateway.enabled .Values.gateway.routes.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ tpl (.Values.gateway.instancesRouteName | toString) . }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
{{ include "theia-cloud.gateway.parentRefs" . | nindent 2 }}
  hostnames:
  {{- if .Values.hosts.usePaths }}
  - {{ tpl (.Values.hosts.configuration.baseHost | toString) . }}
  {{- range .Values.hosts.allWildcardInstances }}
  - {{ printf "%s%s" (tpl . $) (tpl $.Values.hosts.configuration.baseHost $) | quote }}
  {{- end }}
  {{- else }}
  - {{ printf "%s.%s" (tpl .Values.hosts.configuration.instance .) (tpl .Values.hosts.configuration.baseHost .) }}
  {{- range .Values.hosts.allWildcardInstances }}
  - {{ printf "%s%s.%s" (tpl . $) (tpl $.Values.hosts.configuration.instance $) (tpl $.Values.hosts.configuration.baseHost $) | quote }}
  {{- end }}
  {{- end }}
  rules: []
{{- end }}
