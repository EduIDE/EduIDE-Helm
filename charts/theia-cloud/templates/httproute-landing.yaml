{{- if and .Values.gateway.enabled .Values.landingPage.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: landing-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  hostnames:
  {{- if .Values.hosts.usePaths }}
  - {{ tpl (.Values.hosts.configuration.baseHost | toString) . | quote }}
  {{- else }}
  - {{ printf "%s.%s" (tpl .Values.hosts.configuration.landing .) (tpl .Values.hosts.configuration.baseHost .) | quote }}
  {{- end }}
  rules:
  {{- if .Values.hosts.usePaths }}
  - matches:
    - path:
        type: PathExact
        value: /{{ tpl (.Values.hosts.configuration.landing | toString) . }}
    filters:
    - type: RequestRedirect
      requestRedirect:
        path:
          type: ReplaceFullPath
          replaceFullPath: /{{ tpl (.Values.hosts.configuration.landing | toString) . }}/
  - matches:
    - path:
        type: PathPrefix
        value: /{{ tpl (.Values.hosts.configuration.landing | toString) . }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: landing-page-service
      port: 80
  {{- else }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: landing-page-service
      port: 80
  {{- end }}
{{- end }}
