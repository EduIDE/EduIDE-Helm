apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operator-gateway-api-access
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  verbs:
  - list
  - create
  - watch
  - get
  - patch
  - delete
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operator-gateway-api-access
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: operator-gateway-api-access
subjects:
- kind: ServiceAccount
  name: operator-api-service-account
  namespace: {{ .Release.Namespace }}
